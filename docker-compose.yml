services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: shynkro
      POSTGRES_PASSWORD: shynkro
      POSTGRES_DB: shynkro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shynkro"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://shynkro:shynkro@postgres:5432/shynkro
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      SHYNKRO_BLOB_DIR: /data/blobs
      NODE_ENV: production
      LOG_LEVEL: info
      PORT: "3000"
    volumes:
      - ./data/blobs:/data/blobs
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
